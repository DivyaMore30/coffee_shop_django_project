<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
{% extends 'base.html' %}

{% block content %}

<h2 style="text-align:center; margin-top:20px;">
    {{ category.name }} ☕
</h2>

<div class="products">
    {% for product in products %}
        <a href="{% url 'product_detail' product.id %}" class="product-card">

            {% if product.image %}
                <img src="{{ product.image.url }}" alt="{{ product.name }}">
            {% endif %}

            <h3>{{ product.name }}</h3>
            <p>₹{{ product.price }}</p>

        </a>
    {% empty %}
        <p>No products found in this category</p>
    {% endfor %}
</div>

{% endblock %}
</body>
</html>
